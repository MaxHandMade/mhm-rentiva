name: Feature Request
description: Propose an improvement with concrete use-case.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the preferred solution and behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List alternatives and why they were not selected.

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: UX, performance, compatibility, or security impact.
